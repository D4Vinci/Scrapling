name: Create Release and Publish to PyPI
# Creates a GitHub release when a PR is merged to main (using PR title as version and body as release notes), then publishes to PyPI.

on:
  pull_request:
    types: [closed]
    branches:
      - main

jobs:
  create-release-and-publish:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    environment:
      name: PyPI
      url: https://pypi.org/p/scrapling
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Save PR body to file
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            fs.writeFileSync('pr_body.md', context.payload.pull_request.body || '');

      - name: Extract version
        id: extract_version
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          if [[ "$PR_TITLE" =~ ^v[0-9]+(\.[0-9]+)*([.-]?[a-zA-Z][a-zA-Z0-9.+-]*)?$ ]]; then
            printf 'version=%s\n' "$PR_TITLE" >> "$GITHUB_OUTPUT"
            echo "Valid version format found in PR title: $PR_TITLE"
          else
            echo "Error: PR title must look like v1, v1.0, v1.0.0, v1.0.0-rc1, or v1.0.0rc1 to create a release."
            exit 1
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.extract_version.outputs.version }}
          name: Release ${{ steps.extract_version.outputs.version }}
          body_path: pr_body.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.12

      - name: Upgrade pip
        run: python3 -m pip install --upgrade pip

      - name: Install build
        run: python3 -m pip install --upgrade build twine setuptools

      - name: Build a binary wheel and a source tarball
        run: python3 -m build --sdist --wheel --outdir dist/

      - name: Publish distribution 📦 to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1